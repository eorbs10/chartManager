<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading Bot</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #121212; color: #fff; overflow: hidden; }
        .page { width: 100vw; height: 100vh; position: absolute; transition: transform 0.3s ease; padding: 20px; box-sizing: border-box; }
        
        /* 페이지 전환용 */
        #page-setup { transform: translateX(0); }
        #page-analysis { transform: translateX(100%); background: #1a1a1a; }
        .active-analysis #page-setup { transform: translateX(-100%); }
        .active-analysis #page-analysis { transform: translateX(0); }

        /* UI 요소 */
        h2 { color: #f3ba2f; margin-bottom: 30px; }
        select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; box-sizing: border-box; }
        select { background: #333; color: white; appearance: none; }
        button { background: #f3ba2f; color: #000; font-weight: bold; cursor: pointer; }
        .back-btn { background: #444; color: #fff; width: auto; padding: 10px 20px; }

        /* 상태 표시 */
        .status-card { background: #2a2a2a; border-radius: 15px; padding: 20px; margin-top: 20px; border-left: 5px solid #f3ba2f; }
        #timer-bar { height: 4px; background: #f3ba2f; width: 0%; transition: width 1s linear; margin-top: 10px; }
        #log-area { height: 200px; overflow-y: auto; font-size: 13px; color: #aaa; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

    <!-- 1페이지: 설정 -->
    <div id="page-setup" class="page">
        <h2>종목 설정</h2>
        <label>시장 타입</label>
        <select id="market-type">
            <option value="SPOT">현물 (Spot)</option>
            <option value="FUTURES">선물 (Futures)</option>
        </select>

        <label>분석 종목</label>
        <select id="symbol-select">
            <option>불러오는 중...</option>
        </select>

        <button id="start-btn">분석 시작하기</button>
    </div>

    <!-- 2페이지: 분석 -->
    <div id="page-analysis" class="page">
        <button class="back-btn" id="back-btn">← 뒤로가기</button>
        <h2 id="current-symbol-title">BTCUSDT 분석 중</h2>
        
        <div class="status-card">
            <div>상태: <span id="ana-status" style="color:#f3ba2f">데이터 수집 대기</span></div>
            <div id="timer-text" style="font-size: 12px; margin-top:5px;">다음 분석까지: 05:00</div>
            <div id="timer-bar"></div>
        </div>

        <div id="log-area">
            <div>시스템 시작...</div>
        </div>
    </div>

    <script>
        let autoTimer = null;
        let countdown = 300;
        const FIVE_MIN = 300;

        // 1. 종목 리스트 업데이트 (뒤에 거래량 표시 제거)
        async function updateSymbols() {
            const isFutures = document.getElementById('market-type').value === 'FUTURES';
            const url = isFutures ? 'https://fapi.binance.com/fapi/v1/ticker/24hr' : 'https://api.binance.com/api/v3/ticker/24hr';
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                const top10 = data.filter(t => t.symbol.endsWith('USDT'))
                                  .sort((a, b) => b.quoteVolume - a.quoteVolume)
                                  .slice(0, 10);

                const select = document.getElementById('symbol-select');
                select.innerHTML = '';
                top10.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.symbol;
                    opt.innerText = t.symbol; // 거래량 텍스트 제거
                    select.appendChild(opt);
                });
            } catch (e) { console.error("로드 실패"); }
        }

        // 2. 분석 로직 실행
        async function runAnalysis() {
            const symbol = document.getElementById('symbol-select').value;
            const isFutures = document.getElementById('market-type').value === 'FUTURES';
            const status = document.getElementById('ana-status');
            
            status.innerText = "데이터 분석 중...";
            addLog(`${symbol} 데이터 요청...`);

            try {
                const url = isFutures 
                    ? `https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=5m&limit=20`
                    : `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=5m&limit=20`;
                
                const res = await fetch(url);
                const klines = await res.json();
                
                // --- 여기서 분석 알고리즘 호출 ---
                addLog(`최근 종가: ${klines[klines.length-1][4]}`);
                addLog(`분석 알고리즘 작동 완료.`);
                // -----------------------------

                status.innerText = "분석 완료 (대기)";
            } catch (e) {
                status.innerText = "에러 발생";
                addLog("데이터를 가져오는데 실패했습니다.");
            }
        }

        // 로그 기록 함수
        function addLog(msg) {
            const logArea = document.getElementById('log-area');
            const now = new Date().toLocaleTimeString();
            logArea.innerHTML = `<div>[${now}] ${msg}</div>` + logArea.innerHTML;
        }

        // 타이머 제어
        function startTimer() {
            countdown = FIVE_MIN;
            if(autoTimer) clearInterval(autoTimer);
            
            autoTimer = setInterval(() => {
                countdown--;
                updateTimerUI();
                
                if(countdown <= 0) {
                    runAnalysis();
                    countdown = FIVE_MIN;
                }
            }, 1000);
        }

        function updateTimerUI() {
            const min = Math.floor(countdown / 60);
            const sec = countdown % 60;
            document.getElementById('timer-text').innerText = `다음 분석까지: ${min}:${sec < 10 ? '0'+sec : sec}`;
            document.getElementById('timer-bar').style.width = `${((FIVE_MIN - countdown) / FIVE_MIN) * 100}%`;
        }

        // 페이지 전환 이벤트
        document.getElementById('start-btn').onclick = () => {
            document.body.classList.add('active-analysis');
            document.getElementById('current-symbol-title').innerText = `${document.getElementById('symbol-select').value} 분석`;
            runAnalysis(); // 즉시 1회 실행
            startTimer();  // 타이머 시작
        };

        document.getElementById('back-btn').onclick = () => {
            document.body.classList.remove('active-analysis');
            clearInterval(autoTimer); // 타이머 중지
        };

        document.getElementById('market-type').onchange = updateSymbols;
        updateSymbols(); // 초기 로드
    </script>
</body>
</html>
