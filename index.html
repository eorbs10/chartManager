<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Binance Market Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; }
        .selection-area { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; }
        #listContainer { cursor: pointer; color: blue; }
        .hidden { display: none; }
        canvas { max-width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Binance Market Explorer</h1>
        
        <!-- 첫 번째 페이지 역할: 설정 및 목록 -->
        <div id="setupPage" class="selection-area">
            <label for="marketType">시장 선택:</label>
            <select id="marketType">
                <option value="SPOT">현물 (Spot)</option>
                <option value="UM">선물 (USDT-M Futures)</option>
            </select>
            <button onclick="fetchTopVolume()">상위 10개 조회</button>
            <ul id="listContainer"></ul>
        </div>

        <!-- 두 번째 페이지 역할: 차트 및 분석 -->
        <div id="chartPage" class="hidden">
            <button onclick="backToMain()">← 뒤로 가기</button>
            <h2 id="selectedSymbol">--</h2>
            <p id="statsText"></p>
            <canvas id="priceChart"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
