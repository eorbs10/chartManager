<!-- index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TQQQ Debugger</title>
    <style>
        body { background: #0b0e11; color: #eee; font-family: monospace; padding: 20px; }
        .card { border: 1px solid #333; padding: 20px; border-radius: 8px; background: #181a20; }
        .debug-box { background: #000; color: #00ff00; padding: 15px; margin-top: 20px; font-size: 12px; overflow: auto; max-height: 400px; }
        .label { color: #848e9c; }
    </style>
</head>
<body>
    <div class="card">
        <h3>TQQQ 실시간 시세 (Debug Mode)</h3>
        <div><span class="label">Price:</span> <span id="price" style="font-size: 24px;">-</span></div>
        <div id="status" style="margin-top: 10px; color: #848e9c;">데이터 대기 중...</div>
        
        <h4>[Server Raw Response]</h4>
        <pre id="debug-log" class="debug-box">서버로부터 응답을 기다리는 중...</pre>
    </div>
    <script src="script.js"></script>
</body>
</html>
