<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TQQQ Data Fetcher</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: monospace; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; border: 1px solid #333; padding: 20px; border-radius: 8px; }
        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }
        .label { color: #888; }
        .value { color: #00ff88; font-weight: bold; }
        #raw-json { background: #000; padding: 15px; overflow-x: auto; font-size: 12px; margin-top: 20px; height: 300px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📡 TQQQ 실시간 데이터 (5분봉)</h2>
        <div id="status" style="margin-bottom: 15px; font-size: 13px;">연결 중...</div>
        
        <div class="data-row">
            <span class="label">최신 캔들 시간:</span>
            <span id="last-time" class="value">-</span>
        </div>
        <div class="data-row">
            <span class="label">현재가 (Close):</span>
            <span id="last-close" class="value">$0.00</span>
        </div>
        <div class="data-row">
            <span class="label">고가 (High):</span>
            <span id="last-high" class="value">$0.00</span>
        </div>

        <h4>Raw JSON (마지막 캔들)</h4>
        <pre id="raw-json">데이터를 불러오는 중입니다...</pre>
    </div>

    <script src="script.js"></script>
</body>
</html>
