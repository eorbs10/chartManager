<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TQQQ Real-time Terminal</title>
    <!-- 트레이딩뷰 차트 라이브러리 -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; background-color: #0b0e11; color: #eaecef; font-family: sans-serif; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        #chart { flex-grow: 1; width: 100%; }
        .info-bar { padding: 15px; background: #181a20; border-top: 1px solid #2b2f36; display: flex; gap: 20px; }
        .price-up { color: #02c076; font-weight: bold; font-size: 1.2rem; }
        .status { font-size: 12px; color: #848e9c; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 차트가 렌더링될 영역 -->
        <div id="chart"></div>

        <!-- 하단 정보 바 -->
        <div class="info-bar">
            <div>
                <span style="color: #848e9c;">TQQQ/USD:</span>
                <span id="current-price" class="price-up">Loading...</span>
            </div>
            <div id="status" class="status">Vercel API 연결 확인 중...</div>
        </div>
    </div>

    <!-- 로직 분리 -->
    <script src="script.js"></script>
</body>
</html>
