<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 트레이딩 분석기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: #121212; color: #fff; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        select { background: #333; color: white; }
        button { background: #f3ba2f; color: #000; font-weight: bold; cursor: pointer; }
        button:hover { background: #dba827; }
        #result-area { margin-top: 20px; padding: 15px; background: #2a2a2a; border-radius: 8px; min-height: 100px; font-size: 14px; }
        .loading { color: #f3ba2f; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI 분석 세팅</h2>
    
    <label for="market-type">시장 선택</label>
    <select id="market-type">
        <option value="SPOT">현물 (Spot)</option>
        <option value="FUTURES">선물 (USDT-M Futures)</option>
    </select>

    <label for="symbol-select">종목 선택 (거래량 상위 10)</label>
    <select id="symbol-select">
        <option>종목 불러오는 중...</option>
    </select>

    <button id="analyze-btn">AI 분석 시작</button>

    <div id="result-area">
        <strong>분석 상태:</strong> <span id="status">대기 중</span>
        <pre id="data-preview" style="white-space: pre-wrap; margin-top: 10px; color: #aaa;"></pre>
    </div>
</div>

<script>
    const symbolSelect = document.getElementById('symbol-select');
    const marketType = document.getElementById('market-type');
    const analyzeBtn = document.getElementById('analyze-btn');
    const statusText = document.getElementById('status');
    const dataPreview = document.getElementById('data-preview');

    // 1. 거래량 상위 10개 종목 가져오기
    async function updateTopSymbols() {
        const isFutures = marketType.value === 'FUTURES';
        // 선물/현물에 따른 베이스 URL 설정
        const baseUrl = isFutures 
            ? 'https://fapi.binance.com/fapi/v1/ticker/24hr' 
            : 'https://api.binance.com/api/v3/ticker/24hr';

        try {
            const response = await fetch(baseUrl);
            const tickers = await response.json();

            // USDT 마켓 종목만 필터링 후 거래량(quoteVolume) 기준 정렬
            const top10 = tickers
                .filter(t => t.symbol.endsWith('USDT'))
                .sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
                .slice(0, 10);

            symbolSelect.innerHTML = '';
            top10.forEach(item => {
                const option = document.createElement('option');
                option.value = item.symbol;
                option.innerText = `${item.symbol} (거래량: ${Math.floor(item.quoteVolume).toLocaleString()})`;
                symbolSelect.appendChild(option);
            });
            statusText.innerText = "종목 갱신 완료";
        } catch (e) {
            statusText.innerText = "종목 로드 에러";
        }
    }

    // 2. 선택된 종목 데이터 가져오기 및 분석 전송
    async function startAnalysis() {
        const symbol = symbolSelect.value;
        const isFutures = marketType.value === 'FUTURES';
        const klineUrl = isFutures
            ? `https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=5m&limit=20`
            : `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=5m&limit=20`;

        statusText.innerText = `${symbol} 데이터 수집 중...`;

        try {
            const response = await fetch(klineUrl);
            const klines = await response.json();
            
            // AI에게 보낼 데이터 가공 (종가 위주)
            const analysisData = klines.map(k => ({
                time: new Date(k[0]).toLocaleTimeString(),
                close: k[4],
                high: k[2],
                low: k[3],
                volume: k[5]
            }));

            dataPreview.innerText = JSON.stringify(analysisData.slice(-3), null, 2) + "\n...등 20개의 캔들 데이터 확보";
            statusText.innerText = "분석 알고리즘으로 데이터 전송 중...";

            // TODO: 실제 AI API 호출부
            // const aiResponse = await sendToYourAI(analysisData);
            // statusText.innerText = "결과: " + aiResponse.signal;

        } catch (e) {
            statusText.innerText = "데이터 요청 실패";
        }
    }

    // 이벤트 리스너
    marketType.addEventListener('change', updateTopSymbols);
    analyzeBtn.addEventListener('click', startAnalysis);

    // 초기 실행
    updateTopSymbols();
</script>

</body>
</html>
